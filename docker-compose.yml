version: '3.8'

services:
  app:
    build: .
    container_name: yellowcar-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgres://user:password@db:5432/yellowcar_db
      - JWT_SECRET=super_secret_yellow_car_key_123!
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yellowcar-net

  db:
    image: postgres:15-alpine
    container_name: yellowcar-db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=yellowcar_db
    volumes:
      - yellowcar-db-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - yellowcar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  yellowcar-net:
    driver: bridge

volumes:
  yellowcar-db-data:
