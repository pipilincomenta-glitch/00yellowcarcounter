services:
  app:
    build: .
    container_name: yellowcar-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgres://yellowcar_user:anabelle67@infracore-yellowcardb-f8ftmr:5432/yellowcar_db
      - JWT_SECRET=${JWT_SECRET}
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yellowcar.rule=Host(`yellowcarcounter.pipilacha.ca`)"
      - "traefik.http.routers.yellowcar.entrypoints=websecure"
      - "traefik.http.services.yellowcar.loadbalancer.server.port=3001"

  db:
    image: postgres:15-alpine
    container_name: yellowcar-db
    restart: always
    environment:
      - POSTGRES_USER=yellowcar_user
      - POSTGRES_PASSWORD=anabelle67
      - POSTGRES_DB=yellowcar_db
    volumes:
      - yellowcar-db-data:/var/lib/postgresql/data

volumes:
  yellowcar-db-data:
